<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SignupFrom</title>
  </head>
  <body>
    <h1>RICR Registration Form</h1>
    <form>
      <label for="">Name : </label>
      <input type="text" name="" id="" placeholder="Add your Name" />
      <br />
      <label for="">Age : </label>
      <input type="number" name="" id="" />
      <br />
      <label for="">DOB : </label>
      <input type="date" name="" id="" />
      <br />
      <label for="">Email : </label>
      <input type="email" name="" id="" />
      <br />
      <label for="">Password : </label>
      <input type="password" name="" id="" />
      <br />
      <label for="">Gender : </label>
      <input type="radio" name="gender" id="" value="Male" /><span>Male</span>
      <input type="radio" name="gender" id="" value="Female" /><span
        >Female</span
      >
      <input type="radio" name="gender" id="" value="Others" /><span
        >Others</span
      >
      <br />
      <label for="">Document : </label>
      <input type="checkbox" name="" id="" value="Aadhar card" /><span
        >Aadhar card</span
      >
      <input type="checkbox" name="" id="" value="10th DMC" /><span
        >10th DMC</span
      >
      <input type="checkbox" name="" id="" value="12th DMC" /><span
        >12th DMC</span
      >
      <br />
      <label for="">Course : </label>
      <select name="" id="">
        <option value="">-- Select Course --</option>
        <option value="Java + DSA + MERN">Java + DSA + MERN</option>
        <option value="MERN">MERN</option>
        <option value="Data Science">Data Science</option>
        <option value="Data Analytics">Data Analytics</option>
      </select>
      <br />
      <label for="">Address : </label>
      <textarea name="" id=""></textarea>
    </form>
  </body>
</html>
