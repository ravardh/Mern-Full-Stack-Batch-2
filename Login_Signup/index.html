<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Signup Page</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="header"><h1>RICR</h1></div>

     
    </div>
    <div class="container" >
      <div class="form-card">
        <div class="title">
          <div class="slider sliderSlide" id="slider"></div>
          <span id="login">Login</span>
          <span id="signup">SignUp</span>
        </div>
        <div class="page" id="page">
          <div class="loginPage">
            <div class="form-feild">
              <input type="email" placeholder="Email" id="l_em" />
              <input type="password" placeholder="Choose Password" id="l_ps" />
            </div>
            <button type="submit">Login</button>
          </div>
          <div class="signupPage">
            <div class="form-feild">
              <input type="text" placeholder="Full Name" id="s_fm" />
              <input type="email" placeholder="Email" id="s_em" />
              <input type="number" placeholder="Phone Number" id="s_ph" />
              <input type="password" placeholder="Choose Password" id="s_ps" />
              <select id="gndr">
                <option value="">Gender</option>
                <option value="male">Male</option>
                <option value="female">Female</option>
                <option value="others">Others</option>
              </select>
            </div>
            <button type="submit">Sign Up</button>
          </div>
        </div>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
