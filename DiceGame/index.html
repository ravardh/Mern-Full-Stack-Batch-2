<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dice Game</title>
    <link rel="stylesheet" href="style.css" />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
      crossorigin="anonymous"
    />
    <!-- <link rel="stylesheet" href="bootstrap.min.css" /> -->
  </head>
  <body>
    <header>
      <div class="navbar bg-primary d-grid justify-content-center">
        <div class="navbar-brand text-light">
          <h1 class="m-0">Dice Game</h1>
        </div>
      </div>
    </header>

    <main>
      <div class="container bg-light rounded mt-3">
        <div class="players d-flex justify-content-around">
          <div class="container d-grid m-5 p-3 justify-content-center border border-dark rounded shadow">
            <label for="player1" class="display-6" id="pl1nmlb">Player 1</label>
            <img src="" alt="DiceImg" id="p1dice">
            <button type="button" class="btn btn-primary">Roll Dice</button>
          </div>
          <div class="container d-grid m-5 p-3 justify-content-center border border-dark rounded shadow">
            <label for="player2" class="display-6" id="pl2nmlb">Player 2</label>
            <img src="" alt="DiceImg" id="p2dice">
            <button type="button" class="btn btn-primary">Roll Dice</button>
          </div>
        </div>
      </div>
    </main>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
